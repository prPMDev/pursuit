<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pursuit — Job Search Dashboard</title>
  <!-- Vendor: Pico CSS (classless base styling for forms) -->
  <link rel="stylesheet" href="/vendor/pico/pico.min.css">
  <!-- Vendor: Shoelace web components -->
  <link rel="stylesheet" href="/vendor/shoelace/themes/light.css">
  <script type="module">
    import { setBasePath } from '/vendor/shoelace/utilities/base-path.js';
    setBasePath('/vendor/shoelace');
  </script>
  <script type="module" src="/vendor/shoelace/shoelace-autoloader.js"></script>
  <!-- Vendor: Tabulator (job list table) -->
  <link rel="stylesheet" href="/vendor/tabulator/tabulator.min.css">
  <script src="/vendor/tabulator/tabulator.min.js"></script>
  <!-- App styles (overrides vendor defaults) -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Mount points — each module renders its own content -->
  <header id="topbar"></header>

  <div class="profile-strip" id="profile-strip">
    <span class="profile-strip-text" id="profile-strip-text">No profile set — click Profile to get started</span>
  </div>

  <main class="dashboard">
    <!-- Job list (full width by default) -->
    <div class="job-list-panel" id="job-list-panel">
      <div class="filter-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="EVALUATE">Evaluate</button>
          <button class="filter-btn" data-filter="MAYBE">Maybe</button>
          <button class="filter-btn" data-filter="SKIP">Skipped</button>
        </div>
        <div class="filter-group">
          <button class="filter-btn" data-filter="pursuing">Pursuing</button>
          <button class="filter-btn" data-filter="applied">Applied</button>
        </div>
      </div>
      <div id="job-list-table"></div>
    </div>

    <!-- Detail panel (slides in from right, pushes list) -->
    <section class="detail-panel hidden" id="detail-panel">
      <div class="detail-panel-header">
        <button class="btn btn-icon-only btn-ghost" id="btn-close-detail" title="Close">
          <span data-icon="x"></span>
        </button>
      </div>
      <div class="detail-content" id="detail-content">
        <div class="detail-header">
          <h2 id="detail-company"></h2>
          <h3 id="detail-role"></h3>
          <div class="detail-meta" id="detail-meta"></div>
        </div>
        <div class="detail-section">
          <h4>Scanner Rationale</h4>
          <div class="tags" id="detail-tags"></div>
          <p class="narrative" id="detail-narrative"></p>
        </div>
        <div class="detail-section" id="detail-risk-section">
          <h4>Risk</h4>
          <p id="detail-risk"></p>
        </div>
        <div class="detail-section" id="detail-watch-section">
          <h4>Watch For</h4>
          <p id="detail-watch"></p>
        </div>
        <div class="detail-section">
          <h4>Evaluator</h4>
          <div id="detail-evaluator">
            <button class="btn btn-sm" id="btn-evaluate">Run Evaluator</button>
          </div>
        </div>
        <div class="detail-section" id="detail-signal-section">
          <h4>Key Signal</h4>
          <p id="detail-signal"></p>
        </div>
        <div class="detail-section" id="detail-actions-section">
          <h4>Decision</h4>
          <div class="action-buttons" id="action-initial">
            <button class="btn btn-pursue" id="btn-pursue"><span data-icon="target"></span> Pursue</button>
            <button class="btn btn-pass" id="btn-pass"><span data-icon="x"></span> Pass</button>
            <button class="btn btn-save" id="btn-save-later"><span data-icon="bookmark"></span> Save</button>
          </div>
          <div class="action-pipeline hidden" id="action-pipeline">
            <div class="pipeline-status" id="pipeline-status"></div>
            <div class="pipeline-actions">
              <button class="btn btn-sm btn-ghost" id="btn-mark-applied"><span data-icon="send"></span> Mark Applied</button>
              <button class="btn btn-sm btn-ghost" id="btn-mark-interview"><span data-icon="message-square"></span> Interview</button>
              <button class="btn btn-sm btn-ghost" id="btn-mark-offered"><span data-icon="trophy"></span> Offered</button>
              <button class="btn btn-sm btn-ghost" id="btn-mark-rejected"><span data-icon="ban"></span> Rejected</button>
            </div>
            <div class="pipeline-notes">
              <textarea id="pipeline-notes-input" rows="2" placeholder="Notes (hiring manager, next steps, interview date...)"></textarea>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Dynamic content rendered by JS modules -->
  <div id="modal-container"></div>
  <div id="overlay-container"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
