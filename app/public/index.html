<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pursuit — Job Search Dashboard</title>
  <!-- Pico CSS removed — was fighting custom styles. Base form styling now in styles.css -->
  <!-- Vendor: Shoelace web components -->
  <link rel="stylesheet" href="/vendor/shoelace/themes/light.css">
  <script type="module">
    import { setBasePath } from '/vendor/shoelace/utilities/base-path.js';
    setBasePath('/vendor/shoelace');
  </script>
  <script type="module" src="/vendor/shoelace/shoelace-autoloader.js"></script>
  <!-- Vendor: Tabulator (job list table) -->
  <link rel="stylesheet" href="/vendor/tabulator/tabulator.min.css">
  <script src="/vendor/tabulator/tabulator.min.js"></script>
  <!-- App styles (overrides vendor defaults) -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Mount points — each module renders its own content -->
  <header id="topbar"></header>

  <div class="profile-strip" id="profile-strip">
    <span class="profile-strip-text" id="profile-strip-text">No profile set — click Profile to get started</span>
  </div>

  <main class="dashboard">
    <!-- Job list (full width by default) -->
    <div class="job-list-panel" id="job-list-panel">
      <div class="filter-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Inbox</button>
          <button class="filter-btn" data-filter="NEW">New</button>
          <button class="filter-btn" data-filter="EVALUATED">Evaluated</button>
          <button class="filter-btn" data-filter="PURSUING">Pursuing</button>
          <button class="filter-btn" data-filter="passed">Passed</button>
        </div>
      </div>
      <div id="job-list-table"></div>
    </div>

    <!-- Detail panel (slides in from right, pushes list) -->
    <section class="detail-panel hidden" id="detail-panel">
      <div class="detail-panel-header">
        <button class="btn btn-ghost btn-close-detail" id="btn-close-detail" title="Close (Esc)">
          ✕ Close
        </button>
      </div>
      <div class="detail-content" id="detail-content">
        <div id="detail-availability" class="hidden"></div>
        <div class="detail-header">
          <h2 id="detail-company"></h2>
          <h3 id="detail-role"></h3>
          <div class="detail-meta" id="detail-meta"></div>
          <div id="detail-missing" class="hidden"></div>
        </div>
        <div class="detail-section" id="detail-listing-section">
          <h4>Listing Details</h4>
          <dl class="detail-listing-grid" id="detail-listing"></dl>
          <a id="detail-link" class="detail-listing-link hidden" target="_blank" rel="noopener">View original listing →</a>
        </div>
        <div class="detail-section">
          <h4>Scanner Rationale</h4>
          <div class="tags" id="detail-tags"></div>
          <p class="narrative" id="detail-narrative"></p>
        </div>
        <div class="detail-section" id="detail-risk-section">
          <h4>Risk</h4>
          <p id="detail-risk"></p>
        </div>
        <div class="detail-section" id="detail-watch-section">
          <h4>Watch For</h4>
          <p id="detail-watch"></p>
        </div>
        <div class="detail-section">
          <h4>Evaluator</h4>
          <div id="detail-evaluator">
            <button class="btn btn-sm" id="btn-evaluate">Run Evaluator</button>
          </div>
        </div>
        <div class="detail-section" id="detail-signal-section">
          <h4>Key Signal</h4>
          <p id="detail-signal"></p>
        </div>
        <div class="detail-section" id="detail-actions-section">
          <h4>Decision</h4>
          <div class="action-buttons" id="action-initial">
            <button class="btn btn-pursue" id="btn-pursue"><span data-icon="arrow-right"></span> Pursue</button>
            <button class="btn btn-pass" id="btn-pass"><span data-icon="x"></span> Pass</button>
          </div>
          <div class="action-pipeline hidden" id="action-pipeline"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Dynamic content rendered by JS modules -->
  <div id="modal-container"></div>
  <div id="overlay-container"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
